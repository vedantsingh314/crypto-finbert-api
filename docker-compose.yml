version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DEVICE=auto            # "cuda" to force GPU, "cpu" to force CPU
      - MODEL_DIR=/app/model
    volumes:
      - ./model:/app/model:ro  # Mount model dir read-only (no rebuild on weight change)
    restart: unless-stopped

    # ── GPU support (requires nvidia-container-toolkit) ──────────────────────
    # Uncomment to enable:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]